
name: matrix
on: 
  workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.9, 3.10, 3.11]

    steps:
      - name: checking out
        uses: actions/checkout@v7
      - name: setup python
        uses: action/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: check python version
        run: python --version
